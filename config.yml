tools:
  - name: CLAUDE CODE
    command: claude
    args: []
    # anonymous_args: []  # 익명모드 전용 플래그

  - name: CODEX
    command: codex
    args: []

  - name: AGY
    command: agy
    args: []

# ── Theme ──────────────────────────────────────────────────
# built-in: green-black | red-void | amber-dark | cyan-deep
theme:
  name: green-black
  # colors:          # 개별 색상 오버라이드 (주석 해제 후 수정)
  #   signal: "#00ff41"
  #   bg: "#0a0a0a"

settings:
  anonymous_home_prefix: ai-anon-
  double_width_emoji: true # 이모지 터미널 표시 너비 (1칸 렌더링 시 false로 설정)

  # ── Wrapper UI 패딩 ──────────────────────────────────────
  # 좌우: border │ 와 콘텐츠 사이 공백 (단위: 열)
  # 상하: 상단/하단 bar 와 콘텐츠 사이 padding row 수
  wrapper_hpad: 2   # left + right padding (cols each side)
  wrapper_vpad: 1   # top + bottom padding (rows each side)

  # Windows 기본값은 ConPTY/xterm 래퍼입니다. tmux-windows는 Claude/Codex의
  # fullscreen 화면이 깨질 수 있어, 필요할 때만 true로 설정하세요.
  windows_use_tmux: false
